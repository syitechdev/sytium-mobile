name: sytium_mobile
description: "Application mobile compagnon de l'ERP Sytium."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  cached_network_image: ^3.4.1
  dart_pusher_channels: ^1.3.1
  dio: ^5.7.0
  dio_cache_interceptor: ^3.5.0
  file_picker: ^8.1.7
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  fl_chart: ^0.69.2
  flutter:
    sdk: flutter
  flutter_callkit_incoming: ^2.5.5
  flutter_local_notifications: ^22.0.1
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.2
  flutter_webrtc: ^0.12.5
  freezed_annotation: ^2.4.4
  geolocator: ^13.0.2
  go_router: ^14.6.2
  google_maps_flutter: ^2.17.1
  image_picker: ^1.1.2
  intl: ^0.20.0
  json_annotation: ^4.9.0
  mobile_scanner: ^7.2.0
  permission_handler: ^12.0.0
  riverpod_annotation: ^2.6.1
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.2
  vpn_detector: ^1.3.1

dev_dependencies:
  build_runner: ^2.4.13
  flutter_test:
    sdk: flutter
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
        - asset: assets/fonts/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700
